# ICS 安全防御平台 - Docker Compose 编排配置
# 包含: Redis消息队列、Python后端(FastAPI)、Vue3前端
#
# 环境变量:
#   公共变量放在 .env 文件，由 compose 通过 env_file 注入。
#   config.yaml 为配置主源，环境变量可覆盖其中的值。

x-app-env: &app-env
  env_file:
    - ./.env

services:
  # ----------------------------------------------------------------
  # Redis 7 - 消息队列 (Streams)
  # 用于 Collector 和 Agent Service 之间的告警数据传递
  # ----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ics-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ----------------------------------------------------------------
  # Python FastAPI Backend (formerly agent-service)
  # 核心 AI 分析引擎 + RESTful API：告警管理、分析、审批流、审计日志
  # MCP Server 由 Agent 通过 stdio 启动，不需要单独容器
  # ----------------------------------------------------------------
  backend:
    <<: *app-env
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ics-backend
    ports:
      - "${PORT:-8002}:8002"
    environment:
      DB_PATH: /app/data/ics_defense.db
      REDIS_URL: redis://redis:6379
      MCP_CONFIG_PATH: /app/agent/mcp_servers.yaml
      PORT: 8002
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ics-data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/status')"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ----------------------------------------------------------------
  # Vue3 前端 (nginx 静态托管)
  # 指挥面板 UI：告警大屏、攻击链可视化、审批操作、AI对话
  # ----------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ics-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ----------------------------------------------------------------
  # Notification Worker
  # Redis Streams 消费者：监听通知事件，通过飞书/Webhook/邮件发送告警
  # ----------------------------------------------------------------
  notification-worker:
    <<: *app-env
    image: python:3.11-slim
    container_name: ics-notification-worker
    working_dir: /app
    command: ["python", "-m", "notifier.worker"]
    environment:
      REDIS_URL: redis://redis:6379
      FEISHU_BOT_WEBHOOK_URL: ${FEISHU_BOT_WEBHOOK_URL:-}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./notifier:/app/notifier
    restart: unless-stopped

# ----------------------------------------------------------------
# 共享数据卷
# ----------------------------------------------------------------
volumes:
  redis-data:
    driver: local
  ics-data:
    driver: local
