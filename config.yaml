# =============================================================================
# ICS Defense Platform — Unified Configuration
# =============================================================================
# Single source of truth for all services.
#
# Environment variable interpolation:
#   Use ${ENV_VAR} syntax — the config loader resolves these at runtime.
#   Environment variables ALWAYS override values defined here.
# =============================================================================

server:
  port: 8002
  host: "0.0.0.0"
  cors_origins:
    - "http://localhost:5173"
    - "http://localhost:80"

database:
  path: "data/ics_defense.db"

redis:
  url: "redis://localhost:6379"
  enabled: false  # Platform can work without Redis

llm:
  provider: "xai"           # "xai" or "anthropic"
  api_key: "${XAI_API_KEY}"
  base_url: "${XAI_BASE_URL}"
  model: "${XAI_MODEL}"

auth:
  token: "${API_TOKEN}"
  enabled: true

# Agent guard — limits for the ReAct execution loop
guard:
  max_steps: 20
  total_timeout: 300
  max_retries: 2
  step_timeout: 30
  stuck_threshold: 3

# MCP servers config (kept in separate file for modularity)
mcp_servers_path: "agent/mcp_servers.yaml"

# Tool policy (kept in separate file)
tool_policy_path: "agent/tool_policy.yaml"

# Hooks config (kept in separate file)
hooks_path: "agent/hooks.yaml"

# Memory module
memory:
  provider: "simple"

# Notification system
notifications:
  provider: "noop"                          # "noop", "feishu", "webhook"
  redis_stream_key: "ics:notifications"
  redis_consumer_group: "notification-workers"
  max_retries: 5
  base_delay_ms: 1000
  max_delay_ms: 30000
  feishu:
    bot_webhook_url: "${FEISHU_BOT_WEBHOOK_URL}"
    bot_secret: "${FEISHU_BOT_SECRET}"
    app_id: "${FEISHU_APP_ID}"
    app_secret: "${FEISHU_APP_SECRET}"
    app_receive_id: "${FEISHU_APP_RECEIVE_ID}"
    app_receive_id_type: "chat_id"
